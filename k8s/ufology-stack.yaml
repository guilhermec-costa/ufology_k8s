apiVersion: v1
kind: Namespace
metadata:
  name: ufology
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ufodb
  namespace: ufology
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ufodb
  template:
    metadata:
      labels:
        app: ufodb
    spec:
      containers:
        - name: postgres
          image: leogloriainfnet/ufodb:1.0-win
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: devops2025!
            - name: POSTGRES_DB
              value: ufology
---
apiVersion: v1
kind: Service
metadata:
  name: ufodb
  namespace: ufology
spec:
  selector:
    app: ufodb
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: uforedis
  namespace: ufology
spec:
  replicas: 1
  selector:
    matchLabels:
      app: uforedis
  template:
    metadata:
      labels:
        app: uforedis
    spec:
      containers:
        - name: redis
          image: redis:7.4-alpine
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: uforedis
  namespace: ufology
spec:
  selector:
    app: uforedis
  ports:
    - port: 6379
      targetPort: 6379
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: ufology
data:
  DB_NAME: ufology
---
apiVersion: v1
kind: Secret
metadata:
  name: db-secret
  namespace: ufology
type: Opaque
stringData:
  DB_PASSWORD: devops2025!
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ufotracker
  namespace: ufology
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ufotracker
  template:
    metadata:
      labels:
        app: ufotracker
    spec:
      containers:
        - name: ufotracker
          image: guilhermechina/ufotracker:latest
          ports:
            - containerPort: 8080
          env:
            - name: POSTGRES_USERNAME
              value: postgres
            - name: DB_HOST
              value: ufodb
            - name: DB_PORT
              value: "5432"
            - name: REDIS_HOST
              value: uforedis
            - name: REDIS_PORT
              value: "6379"
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_NAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: DB_PASSWORD
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: ufotracker
  namespace: ufology
spec:
  selector:
    app: ufotracker
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
